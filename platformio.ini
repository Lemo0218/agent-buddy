; Agent Buddy — XIAO ESP32-S3 firmware
; Build:  pio run
; Flash:  pio run -t upload
; Monitor: pio device monitor
;
; The board talks to the PC over native USB-CDC serial. The PC bridge sends
; one NDJSON event per line (see docs in README.md / tools/send_event.py).

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Route Serial over the native USB-CDC port (so /dev/ttyACM0 is the REPL/monitor)
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D BUDDY_FW_VERSION=\"0.2.0\"

board_build.arduino.memory_type = qio_opi

lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    ; Display driver (compiled when BUDDY_HAS_DISPLAY=1 in config.h)
    lovyan03/LovyanGFX@^1.1.16
    ; Servo support is only compiled when BUDDY_HAS_SERVO=1 in config.h
    madhephaestus/ESP32Servo@^3.0.5
